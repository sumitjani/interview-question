<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Interview Test</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    max-width: 750px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
}

textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 12px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
<h2>🚀 AI Interview Test</h2>

<form id="qaForm">

<label>1. Software engineer kyu banna chahte ho?</label>
<textarea name="q1"></textarea>

<label>2. Placement nahi hua to?</label>
<textarea name="q2"></textarea>

<label>3. Technology me kya pasand hai?</label>
<textarea name="q3"></textarea>

<label>4. Kaunsi company inspire karti hai?</label>
<textarea name="q4"></textarea>

<label>5. Recently kya seekha?</label>
<textarea name="q5"></textarea>

<label>6. Google band ho gaya to?</label>
<textarea name="q6"></textarea>

<label>7. Binary kyu hota hai?</label>
<textarea name="q7"></textarea>

<label>8. Problem solve kaise karte ho?</label>
<textarea name="q8"></textarea>

<label>9. Kitna padh sakte ho?</label>
<textarea name="q9"></textarea>

<label>10. AI kya hai?</label>
<textarea name="q10"></textarea>

<button type="submit">Submit 🚀</button>

</form>
</div>

<script>
document.getElementById("qaForm").addEventListener("submit", function(e){
e.preventDefault();

let formData = new FormData(this);
let answers = {};
let questions = [];

formData.forEach((val, key)=>{
answers[key] = val;
questions.push(document.querySelector(`[name=${key}]`).previousElementSibling.innerText);
});

localStorage.setItem("answers", JSON.stringify(answers));
localStorage.setItem("questions", JSON.stringify(questions));

alert("✅ Test Submitted Successfully");

window.location.href = "result.html";
});
</script>

</body>
</html>
