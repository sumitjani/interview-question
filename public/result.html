<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Result</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
}

.result {
    margin-bottom: 15px;
    padding: 10px;
    background: #eef;
}

.score-box {
    background: green;
    color: white;
    padding: 5px;
}

.total-score {
    background: linear-gradient(135deg,#28a745,#00c851);
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<div class="container">
<h2>🎯 Results</h2>
<div id="results">⏳ Loading...</div>
</div>

<script>
async function load(){

let answers = JSON.parse(localStorage.getItem("answers"));
let questions = JSON.parse(localStorage.getItem("questions"));

answers = Object.values(answers);

const res = await fetch("/api/evaluate",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body: JSON.stringify({questions, answers})
});

const data = await res.json();

let html = "";

data.results.forEach((r,i)=>{
html += `
<div class="result">
<b>${questions[i]}</b><br>
${answers[i]}<br>
${r.analysis}<br>
<div class="score-box">${r.score}/10</div>
</div>
`;
});

html += `
<div class="total-score">
<h2>${data.totalScore}/100</h2>
<p>${data.totalScore > 80 ? "🔥 Excellent" : "👍 Good"}</p>
</div>
`;

document.getElementById("results").innerHTML = html;
}

load();
</script>

</body>
</html>
