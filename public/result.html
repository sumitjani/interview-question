<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AI Result</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #007bff;
        }

        .result {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9fbff;
            border-left: 5px solid #007bff;
            border-radius: 6px;
        }

        .question-text {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .answer-text {
            font-style: italic;
            margin-bottom: 10px;
            color: #555;
        }

        .score-box {
            display: inline-block;
            padding: 10px 18px;
            background: linear-gradient(45deg, #28a745, #00c851);
            color: white;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 10px;
            font-size: 18px;
        }

        .total-score {
            margin-top: 30px;
            padding: 20px;
            background: #d4edda;
            border-radius: 8px;
            text-align: center;
        }

        .total-score h3 {
            margin-bottom: 10px;
            color: #155724;
        }

        .total-score {
         margin-top: 30px;
         padding: 25px;
         background: linear-gradient(135deg, #28a745, #00c851);
         border-radius: 12px;
         text-align: center;
         color: white;
         box-shadow: 0 8px 20px rgba(0,0,0,0.2);
       }

        .loading {
            text-align: center;
            font-size: 18px;
            color: #007bff;
            padding: 20px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        button:hover {
            background: #0056b3;
        }
    </style>

</head>

<body>

<div class="container">
    <h2>🚀 AI Evaluation Results</h2>

    <div id="results">
        <div class="loading">⏳ AI checking your answers...</div>
    </div>

    <button onclick="goBack()">⬅ Back</button>
</div>

<script>

async function evaluateAnswers() {
    try {
        const answersJSON = localStorage.getItem("answers");
        const questionsJSON = localStorage.getItem("questions");

        if (!answersJSON || !questionsJSON) {
            document.getElementById("results").innerHTML = "<p style='color:red;'>No data found</p>";
            return;
        }

        const answersObj = JSON.parse(answersJSON);
        const questionsObj = JSON.parse(questionsJSON);

        let answers = [];
        let questions = [];

        for (let i = 1; i <= 10; i++) {
            answers.push(answersObj["q" + i]);
            questions.push(questionsObj["q" + i]);
        }

        // 🔥 SINGLE API CALL
        const response = await fetch("/api/evaluate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                questions: questions,
                answers: answers
            })
        });

        const data = await response.json();

        let html = "";
        let totalScore = data.totalScore || 0;

        data.results.forEach((res, i) => {
            html += `
            <div class="result">
                <div class="question-text">Q${i+1}: ${questions[i]}</div>
                <div class="answer-text">Your Answer: ${answers[i]}</div>
                <div><strong>📊 Analysis:</strong> ${res.analysis}</div>
                <div class="score-box">Score: ${res.score}/10</div>
            </div>
            `;
        });

        html += `
<div class="total-score">
    <h3>🎯 Overall Performance</h3>
    <div class="total-score-value">${totalScore}/100</div>
    <p>${totalScore > 80 ? "🔥 Excellent" : totalScore > 50 ? "👍 Good Job" : "💡 Keep Practices"}</p>
</div>
`;

        document.getElementById("results").innerHTML = html;

    } catch (err) {
        document.getElementById("results").innerHTML = "<p style='color:red;'>Error: " + err.message + "</p>";
    }
}

function goBack() {
    window.location.href = "App.html";
}

window.onload = evaluateAnswers;

</script>

</body>
</html>
